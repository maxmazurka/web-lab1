<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Лабораторная работа №1</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1000px;
            margin: 20px auto;
            padding: 20px;
            background-color: #f0f0f0;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            text-align: center;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }
        h2 {
            color: #444;
            margin-top: 30px;
            background-color: #e0e0e0;
            padding: 10px;
            border-radius: 5px;
        }
        .screenshot {
            margin: 30px 0;
            text-align: center;
        }
        .screenshot img {
            max-width: 100%;
            border: 2px solid #ddd;
            border-radius: 5px;
        }
        .screenshot p {
            font-weight: bold;
            color: #555;
            margin-bottom: 10px;
        }
        .info {
            background-color: #f9f9f9;
            padding: 15px;
            border-left: 4px solid #333;
            margin: 20px 0;
        }
        .footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>1. Определение IP-адреса kubsu.ru с помощью ping</h2>
        <div class="screenshot">
            <p>Скриншот 1: ping kubsu.ru</p>
            <img src="w1.png" alt="Скриншот ping">
        </div>

        <h2>2. DNS запросы (nslookup)</h2>
        <div class="screenshot">
            <p>Скриншот 2: nslookup</p>
            <img src="w2.png" alt="Скриншот nslookup">
        </div>

        <h2>3. Информация whois о доменах</h2>
        <div class="screenshot">
            <p>Скриншот 3: whois</p>
            <img src="w3.png" alt="Скриншот whois">
        </div>
    </div>

    <script>
        document.getElementById('date').textContent = new Date().toLocaleDateString('ru-RU');
    </script>
</body>
</html>
